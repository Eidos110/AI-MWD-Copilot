services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mwd_backend
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./backend/data:/app/backend/data:ro
      - ./backend/models:/app/backend/models:ro
    environment:
      - MWD_CORS_ORIGINS=["*"]
      - MWD_LOG_LEVEL=info
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - copilot_net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mwd_frontend
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - copilot_net

networks:
  copilot_net:
    driver: bridge
