services:
  - name: mwd-backend
    region: singapore
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    rootDirectory: .
    envVars:
      - key: MWD_CORS_ORIGINS
        value: '["*"]'
      - key: PYTHONPATH
        value: /app

  - name: mwd-frontend
    region: singapore
    env: node
    buildCommand: npm run build
    startCommand: npm run start
    rootDirectory: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://mwd-backend.onrender.com
      - key: NODE_ENV
        value: production